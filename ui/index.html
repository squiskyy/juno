<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juno</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="2"/><path d="M9 14h10M14 9v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Juno</span>
        </div>
      </div>
      <!-- Models Section -->
      <div class="sidebar-section">
        <h3>Model</h3>
        <select id="model-select">
          <option value="">Loading models...</option>
        </select>
        <div id="model-status" class="status"></div>
      </div>
      <!-- Folders Section -->
      <div class="sidebar-section">
        <div class="section-header">
          <h3>Folders</h3>
          <button id="add-folder-btn" class="icon-btn" title="Add folder">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <ul id="folder-list" class="folder-list"></ul>
      </div>
      <!-- Tools Section -->
      <div class="sidebar-section">
        <div class="section-header">
          <h3>Tools</h3>
        </div>
        <ul id="tool-list" class="tool-list"></ul>
      </div>
      <div class="sidebar-footer">
        <button id="new-chat-btn" class="btn-primary">New Chat</button>
      </div>
    </aside>
    <!-- Main Chat Area -->
    <main class="chat-area">
      <div class="chat-header">
        <button id="sidebar-toggle" class="icon-btn mobile-only">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <span id="chat-title">New Chat</span>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <div class="input-row">
            <textarea id="chat-input" rows="1" placeholder="Message Juno..." autocomplete="off"></textarea>
            <button id="send-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 18 18"><path d="M1.5 9l15-6-6 6 6 6-15-6z" fill="currentColor"/></svg>
            </button>
          </div>
          <div class="input-toolbar">
            <span id="attachment-preview"></span>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
